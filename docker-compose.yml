services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  broker:
    build: ./data_broker
    environment:
      BROKER_PORT: 3000
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      - redis

  simulator-a:
    build: ./eeg_acquisition
    environment:
      ACQ_PORT: 13854
      PACKET_INTERVAL: 1.0
    command: python simulator.py
    ports:
      - "13854:13854"
    profiles: ['sim-local', 'sim-dual']

  simulator-b:
    build: ./eeg_acquisition
    environment:
      ACQ_PORT: 13855
      PACKET_INTERVAL: 1.0
    command: python simulator.py
    ports:
      - "13855:13855"
    profiles: ['sim-local', 'hybrid-local', 'live']

  acquisition-a:
    build: ./eeg_acquisition
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PLAYER_ID: 1
      ACQ_PORT: 13854
      BROKER_URL: http://broker:3000
      POOR_SIGNAL_LEVEL_THRESHOLD: 0
      SOURCE: real
      EEG_HOST: "host.docker.internal"
    command: python acquisition_service.py
    depends_on:
      - broker
    profiles: ['sim-local', 'sim-dual', 'hybrid-local', 'live']

  acquisition-b:
    build: ./eeg_acquisition
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PLAYER_ID: 2
      ACQ_PORT: 13855
      BROKER_URL: http://broker:3000
      POOR_SIGNAL_LEVEL_THRESHOLD: 0
      EEG_HOST: simulator-b
      SOURCE: bot
    command: python acquisition_service.py
    depends_on:
      - broker
      - simulator-b
    profiles: ['sim-local', 'hybrid-local', 'live']

  test-client:
    build: ./test_client
    environment:
      BROKER_URL: "http://broker:3000"
    depends_on:
      - broker
