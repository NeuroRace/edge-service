services:

  simulator-b:
    build: ./eeg_acquisition
    environment:
      ACQ_PORT: 13854
      PACKET_INTERVAL: 1.0
    command: python simulator.py
    ports:
      - "13854:13854"
    profiles: ['sim-dual']
    
  acquisition-b:
    build: ./eeg_acquisition
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PLAYER_ID: 2
      ACQ_PORT: 13854
      BROKER_URL: http://192.168.15.10:3000
      POOR_SIGNAL_LEVEL_THRESHOLD: 0
      # EEG_HOST: simulator-b
      EEG_HOST: host.docker.internal
      SOURCE: real
    command: python acquisition_service.py
    # Sem depends_on: no perfil collector o acquisition-b fala com EEG/broker externos
    # (host.docker.internal / IP remoto), nao com servicos deste compose.
    profiles: ['sim-dual', 'live']
