name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  broker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: data_broker
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: data_broker/package-lock.json
      - run: npm ci
      - run: npm run validate

  acquisition:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install "python-socketio[client]"
      - run: python -m unittest discover -s tests -p "test_*.py"

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config
      - run: docker compose -f docker-compose.collector.yml config
